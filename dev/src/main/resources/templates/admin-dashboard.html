<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- Navigation Bar -->
    <nav class="bg-gray-800 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">HRMS - Admin Portal</h1>
        <a href="/login" class="bg-gray-900 hover:bg-black px-4 py-2 rounded text-sm font-semibold">Logout</a>
    </nav>

    <!-- Main Content -->
    <div class="max-w-6xl mx-auto mt-8 p-4">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Admin Overview</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Employee List Card -->
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                <h3 class="text-lg font-bold text-gray-700 mb-2">Employee Directory</h3>
                <p class="text-gray-500 text-sm mb-4">Manage employee records and profiles.</p>
                <button class="text-blue-600 font-semibold hover:underline">View Employees &rarr;</button>
            </div>

            <!-- Attendance Records Card -->
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
                <h3 class="text-lg font-bold text-gray-700 mb-2">Attendance Records</h3>
                <p class="text-gray-500 text-sm mb-4">Monitor daily attendance for all staff.</p>
                <button class="text-green-600 font-semibold hover:underline">View Attendance &rarr;</button>
            </div>

            <!-- Leave Approvals Card -->
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-yellow-500">
                <h3 class="text-lg font-bold text-gray-700 mb-2">Leave Approvals</h3>
                <p class="text-gray-500 text-sm mb-4">Review and approve pending time-off requests.</p>
                <button class="text-yellow-600 font-semibold hover:underline">Manage Leaves &rarr;</button>
            </div>

        </div>
    </div>

</body>
</html>
