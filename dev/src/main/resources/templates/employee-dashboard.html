<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- Navigation Bar -->
    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">HRMS - Employee Portal</h1>
        <a href="/login" class="bg-blue-800 hover:bg-blue-900 px-4 py-2 rounded text-sm font-semibold">Logout</a>
    </nav>

    <!-- Main Content -->
    <div class="max-w-6xl mx-auto mt-8 p-4">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Welcome back, Employee!</h2>
        
        <!-- Quick Access Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Profile Card -->
            <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
                <h3 class="text-lg font-bold text-gray-700 mb-2">My Profile</h3>
                <p class="text-gray-500 text-sm mb-4">View and edit your personal information and documents.</p>
                <button class="text-blue-600 font-semibold hover:underline">Go to Profile &rarr;</button>
            </div>

            <!-- Attendance Card -->
            <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
                <h3 class="text-lg font-bold text-gray-700 mb-2">Attendance</h3>
                <p class="text-gray-500 text-sm mb-4">Check-in, check-out, and view your daily logs.</p>
                <button class="text-blue-600 font-semibold hover:underline">Mark Attendance &rarr;</button>
            </div>

            <!-- Leave Requests Card -->
            <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
                <h3 class="text-lg font-bold text-gray-700 mb-2">Leave Requests</h3>
                <p class="text-gray-500 text-sm mb-4">Apply for time off and check your approval status.</p>
                <button class="text-blue-600 font-semibold hover:underline">Request Leave &rarr;</button>
            </div>

        </div>
    </div>

</body>
</html>
